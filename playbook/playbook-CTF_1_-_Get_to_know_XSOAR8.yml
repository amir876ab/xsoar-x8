  "3":
    continueonerrortype: ""
    form:
      description: "XSOAR reporting can be a powerful value proposition. \nReports
        can contain widgets and be customized. \nThey can be used for a variety of
        tasks, including things such as measurement of efficiency and teamwork. \n\nOur
        CISO demanded to get a status report on our activities. There is a flag hidden
        in one of the reports. Generate the right report and try to find it :sunglasses:\n\nReports
        are located in the same section as the Dashboards.\n\nMake sure to allow pop-ups
        for downloading the report. \n\n **Did you know?**\n\nIt is easy to create
        and schedule any report on XSOAR. You can save hours otherwise spent collecting
        and collating these from scratch.\nReports are built using widgets. They can
        be used for a variety of tasks. Besides reports distributed to stakeholders,
        you can also track SLAs for tasks and identify areas in your IR processes
        that are time sinks.\n[Click here to read more.](https://docs-cortex.paloaltonetworks.com/r/Cortex-XSOAR/8/Cortex-XSOAR-Administrator-Guide/Reports-Customization)\n___\n![myfile](https://raw.githubusercontent.com/demisto/content/10b88c87c2954c3b97108b3c07596fcf3cf128b7/Packs/ctf01/doc_files/D.gif)\n___\n"
      expired: false
      questions:
      - defaultrows: []
