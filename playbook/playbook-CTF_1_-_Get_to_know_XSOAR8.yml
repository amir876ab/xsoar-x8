  "7":
    continueonerrortype: ""
    form:
      description: "XSOAR 8 uses the same ingestion systems as previous versions.
        Integrations in each of the content packs are still the place to go! \n\nXSOAR
        (including version 8) can support multiple instances of each integration.
        We’ve hidden the flag in one of the already-configured integrations for you.
        \nSadly our attempt to hide it on a deserted island failed, so we put it here
        instead.\n\n**Did you know?**\n\nXSOAR 8 uses the same ingestion systems as
        previous versions. Integrations in each of the content packs are still the
        place to go!\n[Click here to read more.](https://docs-cortex.paloaltonetworks.com/r/Cortex-XSOAR/8/Cortex-XSOAR-Migration-Guide-From-V6-to-V8/Integration-Instance-Configuration)\n___\n![myfile](https://raw.githubusercontent.com/demisto/content/10b88c87c2954c3b97108b3c07596fcf3cf128b7/Packs/ctf01/doc_files/E.gif)\n___\n"
