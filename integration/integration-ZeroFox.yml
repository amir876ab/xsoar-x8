      description: The ID of an alert.
      type: Number
    - contextPath: ZeroFox.Alert.Status
      description: The status of an alert.
      type: String
  - arguments:
    - description: Filters by matching email_address substrings.
      name: email_address
    - description: Filters by entity group ID. Can be filtered by multiple group parameters.
      name: group
    - description: Filters by entity label ID. Can be filtered by multiple label parameters.
      name: label
    - description: Filters by entities with network accounts using an ID. Can be filtered
        by multiple network parameters.
      name: network
    - description: Filters by entities with network accounts using a CSV of network
        names.
      name: networks
    - description: The index of page to fetch.
      name: page
    - description: Filters by entity policy ID. Can be filtered by multiple policy
        parameters. Can be retrieved running the zerofox-get-policy-types command.
      name: policy
    - description: Filters by an entity type ID. Can be filtered by multiple type
        parameters. Can be retrieved running the zerofox-get-entity-types command.
      name: type
    description: Lists all entities associated with the company of the authorized
      user.
    name: zerofox-list-entities
    outputs:
    - contextPath: ZeroFox.Entity.ID
      description: The ID of the entity.
      type: Number
    - contextPath: ZeroFox.Entity.Name
      description: The name of the entity.
      type: String
    - contextPath: ZeroFox.Entity.EmailAddress
      description: The email address associated with the entity.
      type: String
    - contextPath: ZeroFox.Entity.Organization
