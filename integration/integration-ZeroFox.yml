description: Cloud-based SaaS to detect risks found on social media and digital channels.
detaileddescription: |-
  ### Partner Contributed Integration
  #### Integration Author: ZeroFox
  Support and maintenance for this integration are provided by the author. Please use the following contact details:
  - **Email**: [integration-support@zerofox.com](mailto:integration-support@zerofox.com)
  - **URL**: [https://www.zerofox.com/contact-us/](https://www.zerofox.com/contact-us/)
  ***
   # ZeroFox

   ## Configuration
  To obtain your ZeroFox token, email us at [integration-support@zerofox.com](mailto:integration-support@zerofox.com) with your org info to request the service account token for integration.


  ---
  [View Integration Documentation](https://xsoar.pan.dev/docs/reference/integrations/zero-fox)
