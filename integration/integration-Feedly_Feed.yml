description: Ingest articles with indicators, entities and relationships from Feedly
  into XSOAR.
detaileddescription: |-
  ### Partner Contributed Integration
  #### Integration Author: Feedly
  Support and maintenance for this integration are provided by the author. Please use the following contact details:
  - **Email**: [support@feedly.com](mailto:support@feedly.com)
  - **URL**: [https://feedly.com/i/landing/threatIntelligence](https://feedly.com/i/landing/threatIntelligence)
  ***
  ## Feedly

  Use the Feedly integration to import articles with entities, indicators, and relationships from your Feedly boards and folders.

  **Disclaimer** You will need the Feedly for Threat Intelligence package to enable this integration. You can learn more about our product here: https://feedly.com/i/landing/threatIntelligence

  ### Authentication

  To generate an API for the application, go to [the api page on your account](https://feedly.com/i/team/api). We highly recommend that you create a separate token for this integration.


  ---
  [View Integration Documentation](https://xsoar.pan.dev/docs/reference/integrations/feedly-feed)
