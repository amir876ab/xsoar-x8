description: |-
  RunZero is a network discovery and asset inventory
   platform that uncovers every network in use and identifies every device connected – without credentials.
   Scan your network and build your asset inventory in minutes.
detaileddescription: "## RunZero Integration Help\n\n### Generate API tokens\nTo get
  started, you will need an API key / token or API client credentials.\nIf you have
  administrator access you can generate export API tokens and Organization API keys.
  \n1. In the RunZero web console, go to the Organizations section.\n2. Click the
  appropriate organization name.\n3. Scroll down to the export tokens or API tokens
  section. \n4. Click the button to generate a secure API key in the form of a long
  random token. \n\n### API Limit\nAPI calls are rate limited.\n\n\nFor further details,
  see 'Leveraging the API' on page 356 in the\n[RunZero Manual](https://www.runzero.com/docs/runzero-manual.pdf).\n\n\n---\n[View
  Integration Documentation](https://xsoar.pan.dev/docs/reference/integrations/run-zero)"
